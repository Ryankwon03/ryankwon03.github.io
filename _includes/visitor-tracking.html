{% if site.visitor_tracking.script_url %}
<script>
(function() {
  var scriptUrl = {{ site.visitor_tracking.script_url | jsonify }};
  if (!scriptUrl) return;
  try {
    if (sessionStorage.getItem('_vt') === '1') return;
    sessionStorage.setItem('_vt', '1');
  } catch (e) { }

  var page = typeof window.location !== 'undefined' ? (window.location.pathname || window.location.href || '') : '';
  var ua = (typeof navigator !== 'undefined' ? (navigator.userAgent || '') : '').slice(0, 300);

  function sendLog(ip, country, region, city) {
    var q = [
      'action=log',
      'ip=' + encodeURIComponent(ip || ''),
      'country=' + encodeURIComponent(country || ''),
      'region=' + encodeURIComponent(region || ''),
      'city=' + encodeURIComponent(city || ''),
      'page=' + encodeURIComponent(page),
      'ua=' + encodeURIComponent(ua)
    ].join('&');
    var url = scriptUrl + (scriptUrl.indexOf('?') >= 0 ? '&' : '?') + q;
    // Use GET so Apps Script doGet(e) receives params in e.parameter. sendBeacon sends POST and Apps Script gives empty e.parameter for POST-with-URL-params.
    if (typeof fetch !== 'undefined') {
      fetch(url, { method: 'GET', mode: 'no-cors', keepalive: true }).catch(function() {
        var img = new Image();
        img.src = url;
      });
    } else {
      var img = new Image();
      img.src = url;
    }
  }

  function hasLocation(data) {
    return data && (data.country || data.regionName || data.region || data.city || (data.country_name));
  }
  function fromIpApi(geo) {
    return [(geo && geo.country) || '', (geo && geo.regionName) || (geo && geo.region) || '', (geo && geo.city) || ''];
  }
  function fromIpapiCo(geo) {
    return [(geo && geo.country_name) || '', (geo && geo.region) || '', (geo && geo.city) || ''];
  }

  function getIpThenGeo(ip, done) {
    if (!ip) { done('', '', '', ''); return; }
    fetch('https://ip-api.com/json/' + encodeURIComponent(ip) + '?fields=status,country,regionName,city')
      .then(function(r) { return r.json(); })
      .then(function(geo) {
        if (hasLocation(geo)) {
          var c = fromIpApi(geo);
          done(ip, c[0], c[1], c[2]);
          return;
        }
        return fetch('https://ipapi.co/' + encodeURIComponent(ip) + '/json/')
          .then(function(r2) { return r2.json(); })
          .then(function(geo2) {
            if (hasLocation(geo2)) {
              var c = fromIpapiCo(geo2);
              done(ip, c[0], c[1], c[2]);
            } else {
              done(ip, '', '', '');
            }
          });
      })
      .catch(function() {
        fetch('https://ipapi.co/' + encodeURIComponent(ip) + '/json/')
          .then(function(r) { return r.json(); })
          .then(function(geo2) {
            if (hasLocation(geo2)) {
              var c = fromIpapiCo(geo2);
              done(ip, c[0], c[1], c[2]);
            } else {
              done(ip, '', '', '');
            }
          })
          .catch(function() { done(ip, '', '', ''); });
      });
  }

  // 1) Try ip-api.com (IP + location in one call)
  fetch('https://ip-api.com/json/?fields=status,query,country,regionName,city')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.query && hasLocation(data)) {
        sendLog(data.query, data.country || '', data.regionName || '', data.city || '');
        return;
      }
      var ip = (data && data.query) ? data.query : null;
      if (!ip) {
        fetch('https://api.ipify.org?format=json')
          .then(function(r2) { return r2.json(); })
          .then(function(ipData) { ip = (ipData && ipData.ip) ? ipData.ip : ''; getIpThenGeo(ip, sendLog); })
          .catch(function() { sendLog('', '', '', ''); });
      } else {
        getIpThenGeo(ip, sendLog);
      }
    })
    .catch(function() {
      fetch('https://api.ipify.org?format=json')
        .then(function(r) { return r.json(); })
        .then(function(ipData) {
          var ip = (ipData && ipData.ip) ? ipData.ip : '';
          getIpThenGeo(ip, sendLog);
        })
        .catch(function() { sendLog('', '', '', ''); });
    });
})();
</script>
{% endif %}
